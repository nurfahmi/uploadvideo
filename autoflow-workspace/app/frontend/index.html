<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoFlow Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwindcss.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-950 text-slate-100 h-screen flex overflow-hidden select-none">

  <!-- Sidebar -->
  <aside id="sidebar" class="flex flex-col bg-slate-900 border-r border-slate-800 shrink-0 transition-all duration-200" style="width:200px">
    <!-- Rendered by sidebar.js -->
  </aside>

  <!-- Main Area -->
  <div class="flex-1 flex flex-col min-w-0">

    <!-- Page Header -->
    <header class="bg-slate-900/50 border-b border-slate-800 px-5 py-2.5 flex items-center justify-between shrink-0">
      <h1 id="page-title" class="text-sm font-semibold text-slate-200">Dashboard</h1>
      <div id="page-actions" class="flex items-center gap-2"></div>
    </header>

    <!-- Page Content -->
    <main id="page-content" class="flex-1 overflow-hidden flex flex-col min-h-0">
      <div id="page-dashboard" class="page-panel hidden flex-1 overflow-auto"></div>
      <div id="page-queue" class="page-panel hidden flex-1 flex flex-col min-h-0"></div>
      <div id="page-devices" class="page-panel hidden flex-1 overflow-auto"></div>
      <div id="page-editor" class="page-panel hidden flex-1 overflow-auto"></div>
      <div id="page-history" class="page-panel hidden flex-1 overflow-auto"></div>
      <div id="page-settings" class="page-panel hidden flex-1 overflow-auto"></div>
    </main>

    <!-- Console Panel -->
    <div id="console-panel" class="border-t border-slate-800 flex flex-col shrink-0 transition-all duration-200" style="height:200px">
      <div class="flex items-center justify-between px-5 py-1.5 bg-slate-900/70 border-b border-slate-800 shrink-0">
        <div class="flex items-center gap-2">
          <div class="flex gap-1">
            <span class="w-2 h-2 rounded-full bg-red-500/70"></span>
            <span class="w-2 h-2 rounded-full bg-amber-500/70"></span>
            <span class="w-2 h-2 rounded-full bg-emerald-500/70"></span>
          </div>
          <span class="text-[10px] text-slate-600 font-mono ml-1">console</span>
        </div>
        <div class="flex items-center gap-2">
          <button id="btn-clear-logs" class="text-[10px] text-slate-600 hover:text-slate-400 transition-colors cursor-pointer">Clear</button>
          <button id="btn-toggle-console" class="p-0.5 text-slate-600 hover:text-slate-400 transition-colors cursor-pointer">
            <svg id="console-chevron" class="w-3.5 h-3.5 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
          </button>
        </div>
      </div>
      <div id="console-output" class="flex-1 overflow-y-auto bg-slate-950 px-4 py-2 font-mono text-[11px] leading-relaxed">
        <p class="text-slate-600 italic">Waiting for engine output...</p>
      </div>
    </div>
  </div>

  <!-- Overlay scripts (classic, non-module) -->
  <script src="./hp-guide.js"></script>
  <script src="./onboarding.js"></script>

  <!-- App modules -->
  <script type="module" src="./js/app.js"></script>
</body>
</html>
