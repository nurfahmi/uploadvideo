name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: autoflow-workspace/app/src-tauri

      - name: Install npm dependencies
        working-directory: autoflow-workspace/app
        run: npm install

      - name: Bundle resources (Python + ADB)
        shell: pwsh
        run: |
          $RESOURCES = "autoflow-workspace\app\src-tauri\resources"
          $TEMP = "autoflow-workspace\app\src-tauri\_build_temp"
          New-Item -ItemType Directory -Force -Path $TEMP | Out-Null

          # Download Python Embeddable
          Write-Host "Downloading Python Embeddable..."
          $pyZip = "$TEMP\python-embed.zip"
          Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip" -OutFile $pyZip
          $pyDir = "$RESOURCES\python"
          if (Test-Path $pyDir) { Remove-Item -Recurse -Force $pyDir }
          New-Item -ItemType Directory -Force -Path $pyDir | Out-Null
          Expand-Archive -Path $pyZip -DestinationPath $pyDir -Force

          # Enable pip
          $pth = Get-ChildItem "$pyDir\python*._pth" | Select-Object -First 1
          if ($pth) {
            $c = Get-Content $pth.FullName
            $c = $c -replace "^#import site", "import site"
            $c += "`nLib\site-packages"
            Set-Content $pth.FullName $c
          }

          # Install pip
          Write-Host "Installing pip..."
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile "$TEMP\get-pip.py"
          & "$pyDir\python.exe" "$TEMP\get-pip.py" --no-warn-script-location

          # Install packages
          Write-Host "Installing airtest + pure-python-adb..."
          & "$pyDir\python.exe" -m pip install --no-warn-script-location airtest pure-python-adb --target "$pyDir\Lib\site-packages"

          # Download ADB
          Write-Host "Downloading ADB..."
          $adbZip = "$TEMP\platform-tools.zip"
          Invoke-WebRequest -Uri "https://dl.google.com/android/repository/platform-tools-latest-windows.zip" -OutFile $adbZip
          $adbDir = "$RESOURCES\adb"
          if (Test-Path $adbDir) { Remove-Item -Recurse -Force $adbDir }
          New-Item -ItemType Directory -Force -Path $adbDir | Out-Null
          Expand-Archive -Path $adbZip -DestinationPath $TEMP -Force
          Copy-Item "$TEMP\platform-tools\adb.exe" "$adbDir\"
          Copy-Item "$TEMP\platform-tools\AdbWinApi.dll" "$adbDir\"
          Copy-Item "$TEMP\platform-tools\AdbWinUsbApi.dll" "$adbDir\"

          # Cleanup
          Remove-Item -Recurse -Force $TEMP
          Write-Host "Bundle complete!"

      - name: Build Tauri app
        working-directory: autoflow-workspace/app
        run: npm run tauri build

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: AutoFlow-Engine-Windows-x64
          path: |
            autoflow-workspace/app/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
